      - response-transformer:
          - action:
              headers:
                add:
                  # note: literal header values should be quoted twice
                  # see https://www.express-gateway.io/docs/policies/response-transformer/
                  'X-XSS-Protection': "'1; mode-block'"
                  'Strict-Transport-Security': "'max-age=31536000; includeSubDomains; preload'"
                  'X-Frame-Options': "'SAMEORIGIN'"
                  'X-Content-Type-Options': "'nosniff'"
                  # note: double escaping because of YAML parsing
                  'Content-Security-Policy': "'default-src \\'self\\''"
                  'Access-Control-Allow-Origin': "'*.surf.nl'"
                  'Referrer-Policy': "'no-referrer-when-downgrade'"

      - openapi-validator:
          - action:
              apiSpec: 'ooapiv6.json'
              validateRequests: '/^application\/vnd.oeapi+json\s*;\s*version=6.*/.test(req.headers["accept"])'
              validateResponses: false # disable, always

      - openapi-validator:
          - action:
              apiSpec: 'ooapiv5.json'
              validateRequests: 'req.headers["accept"].startsWith("application/json")'
              validateResponses: false # disable, always
              
      - aggregation:
          - action:
              noEnvelopIfAnyHeaders:
                'X-Envelope-Response': 'false'
              keepRequestHeaders:
                - 'accept-language'
                - 'accept'
                - 'traceparent'
              keepResponseHeaders:
                - 'content-type'
                - 'content-length'
                - 'traceparent'
