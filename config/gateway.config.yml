    proxyOptions:
      auth: fred:wilma
  'Other-Test.Backend':
    url: '${OOAPI_OTHER_TEST_BACKEND_URL:-http://localhost:8083/ooapi/}'
    proxyOptions:
      oauth2:
        clientCredentials:
