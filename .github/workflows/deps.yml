name: Check deps

on:
  schedule:
    - cron: '0 0 * * 1'
  push:
  pull_request:

jobs:
  deps:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
      with:
        node-version: 22

    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
    - run: npm ci
    - run: npm audit --omit dev
