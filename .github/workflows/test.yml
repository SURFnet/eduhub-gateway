name: test

on:
  - push

env:
  SECRETS_KEY_FILE: config/test-secret.txt

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7
      with:
        submodules: recursive
    - uses: actions/setup-node@v6
      with:
        node-version: 22
    - run: npm ci
    - run: make test
